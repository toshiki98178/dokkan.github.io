<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ドッカン管理アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>ドッカンキャラ管理</h1>

  <!-- フィルタ -->
  <div id="filters">
    <select id="filter-dupe">
      <option value="">凸数すべて</option>
      <option value="0">0凸</option>
      <option value="1">1凸</option>
      <option value="2">2凸</option>
      <option value="3">3凸</option>
      <option value="4">4凸</option>
    </select>
  </div>

  <!-- キャラ一覧 -->
  <div id="character-list"></div>

  <!-- 登録フォーム -->
  <h2>キャラ登録</h2>
  <input type="text" id="name" placeholder="名前">
  <input type="file" id="image">
  
  <select id="dupe">
    <option value="0">0凸</option>
    <option value="1">1凸</option>
    <option value="2">2凸</option>
    <option value="3">3凸</option>
    <option value="4">4凸</option>
  </select>

  <select id="attribute"></select>

  <input type="text" id="tags" placeholder="タグ（カンマ区切り）">

  <button onclick="addCharacter()">追加</button>

  <script src="app.js"></script>
</body>
</html>
