<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="ドッカン管理">
  <meta name="theme-color" content="#667eea">
  <title>ドッカン管理アプリ</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- ヘッダー -->
  <div class="header">
    <h1>ドッカンキャラ管理</h1>
    <button id="register-btn" onclick="toggleRegistration()">＋</button>
  </div>

  <!-- 登録フォーム -->
  <div class="registration-section" id="registration-section" style="display: none;">
    <div class="registration-header">
      <h2>キャラ登録</h2>
      <button class="close-btn" onclick="toggleRegistration()">×</button>
    </div>
    <input type="text" id="name" placeholder="キャラクター名">
    <input type="file" id="image" accept="image/*">

    <select id="dupe">
      <option value="0">0凸</option>
      <option value="1">1凸</option>
      <option value="2">2凸</option>
      <option value="3">3凸</option>
      <option value="4">4凸</option>
    </select>

    <select id="attribute">
      <option value="">属性を選択</option>
    </select>

    <input type="text" id="tags" placeholder="タグ（カンマ区切りで入力）">

    <button onclick="addCharacter()">キャラクターを追加</button>
  </div>

  <!-- フィルタ -->
  <div id="filters">
  　<select id="filter-dupe">
    　<option value="">凸数すべて</option>
    　<option value="0">0凸</option>
    　<option value="1">1凸</option>
    　<option value="2">2凸</option>
    　<option value="3">3凸</option>
    　<option value="4">4凸</option>
  　</select>

  　<select id="sort-by" onchange="render()">
    　<option value="">並び替えなし</option>
    　<option value="dupe-desc">凸数：高→低</option>
    　<option value="dupe-asc">凸数：低→高</option>
    　<option value="name-asc">名前：五十音順</option>
    　<option value="attribute-asc">属性：あいうえお順</option>
  　</select>

  　<div id="filter-attributes"></div>

  　<div id="filter-tags"></div>
　</div>

  <!-- キャラ一覧 -->
  <div id="character-list"></div>

  <script src="app.js"></script>
</body>
</html>
